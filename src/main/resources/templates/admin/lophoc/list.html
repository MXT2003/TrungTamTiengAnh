<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout :: layout(~{::section})">

<section>
    <style>
        .panel-custom {
            border-radius: 8px;
            border-top: 5px solid #3f51b5;
            /* Primary color for "Classes" related items in this theme */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            background: #fff;
            padding: 30px;
        }

        .table>thead>tr>th {
            border-bottom: 2px solid #3f51b5;
            color: #353535;
        }

        .btn-custom-success {
            background-color: #29ca8e;
            color: #fff;
            border-radius: 50px;
            padding: 8px 20px;
            border: none;
            transition: all 0.3s;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn-custom-success:hover {
            background-color: #23ba81;
            color: #fff;
        }

        .btn-custom-warning {
            background-color: #f6c23e;
            color: #fff;
            border-radius: 50px;
            border: none;
            transition: all 0.3s;
        }

        .btn-custom-warning:hover {
            background-color: #dda116;
            color: #fff;
        }

        .btn-custom-danger {
            background-color: #e74a3b;
            color: #fff;
            border-radius: 50px;
            border: none;
            transition: all 0.3s;
        }

        .btn-custom-danger:hover {
            background-color: #c7291a;
            color: #fff;
        }

        .action-links {
            margin-top: 20px;
        }

        .action-links a {
            color: #757575;
            font-weight: bold;
        }

        .action-links a:hover {
            color: #353535;
        }
    </style>

    <div class="panel-custom">
        <h3 style="margin-bottom: 25px; color: #353535; font-weight: bold;">Danh sách lớp học</h3>

        <a href="/admin/lophoc/add" class="btn btn-custom-success">
            <i class="fa fa-plus"></i> Thêm lớp
        </a>

        <div
            style="margin-bottom: 40px; background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
            <h4 style="text-align: center; margin-bottom: 20px; color: #3f51b5; font-weight: bold;">Biểu đồ thống kê lớp
                học theo giáo viên</h4>
            <canvas id="teacherChart" height="100"></canvas>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-striped" id="classesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên lớp</th>
                        <th>Giáo viên</th>
                        <th>Lịch học</th>
                        <th>Sĩ số</th>
                        <th>Học phí</th>
                        <th>Trang thai</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="lh : ${list}">
                        <td th:text="${lh.id}"></td>
                        <td th:text="${lh.tenLop}" style="font-weight: bold; color: #353535;"></td>
                        <td class="teacher-name" th:text="${lh.teacher != null ? lh.teacher.fullName : lh.giaoVien}"></td>
                        <td th:text="${lh.lichHoc}"></td>
                        <td th:text="${lh.siSo}"></td>
                        <td th:text="${lh.hocPhi}"></td>
                        <td>
                            <span th:text="${lh.moDangKy ? 'Mo' : 'Dong'}"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/lophoc/edit/{id}(id=${lh.id})}" class="btn btn-custom-warning btn-sm"
                                title="Sửa">
                                <i class="fa fa-pencil"></i>
                            </a>

                            <a th:href="@{/admin/lophoc/delete/{id}(id=${lh.id})}" class="btn btn-custom-danger btn-sm"
                                onclick="return confirm('Bạn có chắc muốn xoá?')" title="Xoá">
                                <i class="fa fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                var teacherElements = document.querySelectorAll('.teacher-name');
                var teacherCounts = {};

                teacherElements.forEach(function (el) {
                    var name = el.innerText.trim();
                    if (name) {
                        teacherCounts[name] = (teacherCounts[name] || 0) + 1;
                    }
                });

                var labels = Object.keys(teacherCounts);
                var data = Object.values(teacherCounts);

                var ctx = document.getElementById('teacherChart').getContext('2d');
                var chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Số lượng lớp học phụ trách',
                            data: data,
                            backgroundColor: 'rgba(63, 81, 181, 0.7)',
                            borderColor: 'rgba(63, 81, 181, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            });
        </script>

        <div class="action-links">
            <a href="/admin/home"><i class="fa fa-arrow-left"></i> Quay lại Dashboard</a>
        </div>
    </div>

</section>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section}, 'Quản lý lớp học')}">
<section>
    <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-10 border-l-4 border-primary pl-6">
        <div>
            <h1 class="text-3xl md:text-4xl font-bold text-white font-display">Danh sách lớp học</h1>
            <p class="text-primary/70 mt-2 italic">Theo dõi tiến độ và sĩ số từng lớp</p>
        </div>
        <a class="flex items-center gap-2 px-6 py-3 bg-primary text-background-dark font-bold rounded-lg hover:bg-champagne transition-all" href="/admin/lophoc/add">
            <span class="material-symbols-outlined">add_circle</span>
            Thêm lớp mới
        </a>
    </div>

    <form class="mb-6" method="get">
        <div class="flex flex-col md:flex-row gap-4">
            <input class="flex-1 rounded-lg bg-white/5 border border-white/10 text-slate-100" name="q" placeholder="Tìm tên lớp..." th:value="${q}" type="text"/>
            <button class="px-6 py-3 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all" type="submit">Tìm</button>
        </div>
    </form>

    <div class="overflow-hidden rounded-2xl border border-primary/10 glass-card">
        <table class="min-w-full divide-y divide-white/10">
            <thead class="bg-white/5 text-slate-300">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">ID</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Tên lớp</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Khóa học</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Giáo viên</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Lịch học</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Sĩ số</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Học phí</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Trạng thái</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
                <tr class="hover:bg-white/5" th:each="lh : ${page.content}">
                    <td class="px-4 py-3" th:text="${lh.id}"></td>
                    <td class="px-4 py-3 font-semibold text-slate-100" th:text="${lh.tenLop}"></td>
                    <td class="px-4 py-3" th:text="${lh.course != null ? lh.course.name : ''}"></td>
                    <td class="px-4 py-3" th:text="${lh.teacher != null ? lh.teacher.fullName : lh.giaoVien}"></td>
                    <td class="px-4 py-3" th:text="${lh.lichHoc}"></td>
                    <td class="px-4 py-3" th:text="${lh.siSo}"></td>
                    <td class="px-4 py-3" th:text="|${#numbers.formatDecimal(lh.hocPhi, 0, 'POINT', 0, 'COMMA')} VND|"></td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 text-xs rounded-full" th:classappend="${lh.moDangKy} ? ' bg-green-500/20 text-green-300' : ' bg-red-500/20 text-red-300'" th:text="${lh.moDangKy ? 'Mở' : 'Đóng'}"></span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <a class="px-3 py-2 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all" th:href="@{/admin/lophoc/edit/{id}(id=${lh.id})}" title="Sửa">
                                <span class="material-symbols-outlined text-sm">edit</span>
                            </a>
                            <a class="px-3 py-2 rounded-lg border border-red-500/40 text-red-400 hover:bg-red-500 hover:text-white transition-all" th:href="@{/admin/lophoc/delete/{id}(id=${lh.id})}" onclick="return confirm('Bạn có chắc muốn xóa?')" title="Xóa">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-8 flex justify-between items-center" th:if="${page != null}">
        <div class="text-primary/50 text-sm" th:text="'Trang ' + ${page.totalPages == 0 ? 1 : page.number + 1} + ' / ' + ${page.totalPages == 0 ? 1 : page.totalPages}">Trang 1 / 1</div>
        <div class="flex items-center gap-2">
            <span class="size-10 flex items-center justify-center rounded border border-primary/20 text-primary/20 cursor-not-allowed" th:if="${page.first}">
                <span class="material-symbols-outlined">chevron_left</span>
            </span>
            <a class="size-10 flex items-center justify-center rounded border border-primary/30 text-primary hover:border-primary transition-all" th:unless="${page.first}" th:href="@{/admin/lophoc(page=${page.number-1}, size=${page.size}, q=${q})}">
                <span class="material-symbols-outlined">chevron_left</span>
            </a>
            <th:block th:if="${page.totalPages > 0}">
                <a class="size-10 flex items-center justify-center rounded border border-primary/30 text-primary font-bold" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" th:classappend="${i==page.number} ? ' bg-primary text-background-dark border-primary' : ''" th:href="@{/admin/lophoc(page=${i}, size=${page.size}, q=${q})}" th:text="${i+1}">1</a>
            </th:block>
            <span class="size-10 flex items-center justify-center rounded border border-primary/30 bg-primary text-background-dark font-bold" th:if="${page.totalPages == 0}">1</span>
            <span class="size-10 flex items-center justify-center rounded border border-primary/20 text-primary/20 cursor-not-allowed" th:if="${page.last or page.totalPages == 0}">
                <span class="material-symbols-outlined">chevron_right</span>
            </span>
            <a class="size-10 flex items-center justify-center rounded border border-primary/30 text-primary hover:border-primary transition-all" th:unless="${page.last or page.totalPages == 0}" th:href="@{/admin/lophoc(page=${page.number+1}, size=${page.size}, q=${q})}">
                <span class="material-symbols-outlined">chevron_right</span>
            </a>
        </div>
    </div>
</section>
</html>

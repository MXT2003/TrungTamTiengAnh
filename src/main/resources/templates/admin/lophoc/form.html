<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section}, 'Cập nhật lớp học')}">
<section>
    <div class="max-w-4xl mx-auto">
        <div class="gold-gradient-border rounded-2xl p-8 glass-card">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-white font-display">Thêm / Sửa lớp học</h1>
                    <p class="text-slate-400 text-sm">Thiết lập lịch học và thông tin giáo viên</p>
                </div>
                <a class="text-primary hover:underline" href="/admin/lophoc">Quay lại danh sách</a>
            </div>

            <form th:action="@{/admin/lophoc/save}" th:object="${lophoc}" method="post" class="space-y-6">
                <div th:if="${#fields.hasGlobalErrors()}" class="text-red-400 text-sm">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                </div>

                <input type="hidden" th:field="*{id}" />

                <div>
                    <label class="block text-sm font-medium text-slate-300">Tên lớp</label>
                    <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="text" th:field="*{tenLop}" required />
                    <div th:if="${#fields.hasErrors('tenLop')}" class="text-red-400 text-xs mt-2">
                        <span th:errors="*{tenLop}"></span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Khóa học</label>
                        <select class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" name="courseId">
                            <option value="">-- Chọn khóa học --</option>
                            <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.name}" th:selected="${lophoc.course != null && lophoc.course.id == c.id}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Giáo viên</label>
                        <select class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" name="teacherId">
                            <option value="">-- Chọn giáo viên --</option>
                            <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}" th:selected="${lophoc.teacher != null && lophoc.teacher.id == t.id}"></option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300">Giáo viên (tên hiển thị)</label>
                    <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="text" th:field="*{giaoVien}" required />
                    <div th:if="${#fields.hasErrors('giaoVien')}" class="text-red-400 text-xs mt-2">
                        <span th:errors="*{giaoVien}"></span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Ngày bắt đầu</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="date" th:field="*{ngayBatDau}" id="ngayBatDau" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Ngày kết thúc</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="date" th:field="*{ngayKetThuc}" id="ngayKetThuc" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Thứ</label>
                        <div class="mt-2 grid grid-cols-3 gap-2 text-slate-100">
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="MON" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'MON')}" />
                                Mon
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="TUE" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'TUE')}" />
                                Tue
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="WED" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'WED')}" />
                                Wed
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="THU" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'THU')}" />
                                Thu
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="FRI" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'FRI')}" />
                                Fri
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="SAT" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'SAT')}" />
                                Sat
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" name="thu" value="SUN" class="accent-primary"
                                       th:checked="${lophoc.thu != null && #lists.contains(#strings.arraySplit(lophoc.thu, ','), 'SUN')}" />
                                Sun
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Giờ bắt đầu</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="time" th:field="*{gioBatDau}" id="gioBatDau" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Giờ kết thúc</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="time" th:field="*{gioKetThuc}" id="gioKetThuc" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Lịch học</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="text" th:field="*{lichHoc}" id="lichHoc" readonly required />
                        <div th:if="${#fields.hasErrors('lichHoc')}" class="text-red-400 text-xs mt-2">
                            <span th:errors="*{lichHoc}"></span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Sĩ số</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="number" th:field="*{siSo}" required />
                        <div th:if="${#fields.hasErrors('siSo')}" class="text-red-400 text-xs mt-2">
                            <span th:errors="*{siSo}"></span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Học phí</label>
                        <input class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" type="number" th:field="*{hocPhi}" required />
                        <div th:if="${#fields.hasErrors('hocPhi')}" class="text-red-400 text-xs mt-2">
                            <span th:errors="*{hocPhi}"></span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300">Trạng thái đăng ký</label>
                        <select class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" th:field="*{moDangKy}">
                            <option th:value="true">Mở đăng ký</option>
                            <option th:value="false">Đóng đăng ký</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center gap-4 pt-2">
                    <button type="submit" class="px-6 py-3 rounded-lg bg-primary text-background-dark font-bold hover:bg-champagne transition-all">Lưu</button>
                    <a href="/admin/lophoc" class="px-6 py-3 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all">Hủy</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        (function () {
            function formatDate(iso) {
                if (!iso) return "";
                var parts = iso.split("-");
                if (parts.length !== 3) return iso;
                return parts[2] + "/" + parts[1] + "/" + parts[0];
            }

            function getSelectedDays() {
                var boxes = document.querySelectorAll('input[name="thu"]:checked');
                var labels = [];
                boxes.forEach(function (b) { labels.push(b.value); });
                return labels;
            }

            function updateSchedule() {
                var startDate = document.getElementById("ngayBatDau").value;
                var endDate = document.getElementById("ngayKetThuc").value;
                var startTime = document.getElementById("gioBatDau").value;
                var endTime = document.getElementById("gioKetThuc").value;
                var days = getSelectedDays();

                var parts = [];
                if (startDate && endDate) {
                    parts.push(formatDate(startDate) + " - " + formatDate(endDate));
                }
                if (days.length > 0) {
                    parts.push(days.join(", "));
                }
                if (startTime && endTime) {
                    parts.push(startTime + "-" + endTime);
                }

                document.getElementById("lichHoc").value = parts.join(" | ");
            }

            document.addEventListener("change", function (e) {
                if (e.target.matches('#ngayBatDau, #ngayKetThuc, #gioBatDau, #gioKetThuc, input[name="thu"]')) {
                    updateSchedule();
                }
            });

            document.addEventListener("DOMContentLoaded", updateSchedule);
        })();
    </script>
</section>
</html>

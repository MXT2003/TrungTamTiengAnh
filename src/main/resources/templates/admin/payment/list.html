<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section}, 'Quản lý học phí')}">
<section>
    <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-10 border-l-4 border-primary pl-6">
        <div>
            <h1 class="text-3xl md:text-4xl font-bold text-white font-display">Quản lý học phí</h1>
            <p class="text-primary/70 mt-2 italic">Theo dõi công nợ và thanh toán</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="glass-card rounded-xl p-4">
            <p class="text-slate-400 text-sm">Đã thu</p>
            <p class="text-xl font-bold text-primary" th:text="${sumPaid}">0</p>
        </div>
        <div class="glass-card rounded-xl p-4">
            <p class="text-slate-400 text-sm">Chưa thu</p>
            <p class="text-xl font-bold text-primary" th:text="${sumUnpaid}">0</p>
        </div>
    </div>

    <form method="post" th:action="@{/admin/payments/create}" class="mb-6 flex flex-col md:flex-row gap-4">
        <div class="flex-1">
            <label class="block text-sm text-slate-300 mb-2">Tạo học phí cho lớp</label>
            <select name="classId" class="w-full rounded-lg bg-white/5 border border-white/10 text-slate-100">
                <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.tenLop}"></option>
            </select>
        </div>
        <div class="flex items-end">
            <button type="submit" class="px-6 py-3 rounded-lg bg-primary text-background-dark font-bold hover:bg-champagne transition-all">Tạo hóa đơn</button>
        </div>
    </form>

    <form class="mb-6 flex flex-col md:flex-row gap-4" method="get">
        <select name="status" class="rounded-lg bg-white/5 border border-white/10 text-slate-100">
            <option value="">Tất cả</option>
            <option value="PAID" th:selected="${status == 'PAID'}">PAID</option>
            <option value="UNPAID" th:selected="${status == 'UNPAID'}">UNPAID</option>
        </select>
        <button type="submit" class="px-6 py-3 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all">Lọc</button>
    </form>

    <div class="overflow-hidden rounded-2xl border border-primary/10 glass-card">
        <table class="min-w-full divide-y divide-white/10">
            <thead class="bg-white/5 text-slate-300">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Học viên</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Lớp</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Số tiền</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Trạng thái</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Hạn nộp</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Ngày nộp</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
                <tr class="hover:bg-white/5" th:each="p : ${page.content}">
                    <td class="px-4 py-3" th:text="${p.student != null ? p.student.username : ''}"></td>
                    <td class="px-4 py-3" th:text="${p.lopHoc != null ? p.lopHoc.tenLop : ''}"></td>
                    <td class="px-4 py-3" th:text="${p.amount}"></td>
                    <td class="px-4 py-3" th:text="${p.status}"></td>
                    <td class="px-4 py-3" th:text="${p.dueDate}"></td>
                    <td class="px-4 py-3" th:text="${p.paidDate}"></td>
                    <td class="px-4 py-3">
                        <form th:if="${p.status != 'PAID'}" th:action="@{/admin/payments/mark-paid/{id}(id=${p.id})}" method="post">
                            <button type="submit" class="px-3 py-2 rounded-lg bg-green-500/20 text-green-300 border border-green-500/40 hover:bg-green-500 hover:text-white transition-all">Đã nộp</button>
                        </form>
                        <form th:if="${p.status == 'PAID'}" th:action="@{/admin/payments/mark-unpaid/{id}(id=${p.id})}" method="post">
                            <button type="submit" class="px-3 py-2 rounded-lg border border-amber-500/40 text-amber-300 hover:bg-amber-500 hover:text-white transition-all">Hủy nộp</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-8 flex justify-between items-center" th:if="${page != null}">
        <div class="text-primary/50 text-sm" th:text="'Trang ' + ${page.number+1} + ' / ' + ${page.totalPages}">Trang 1 / 1</div>
        <div class="flex items-center gap-2">
            <a class="size-10 flex items-center justify-center rounded border border-primary/30 text-primary/30" th:classappend="${page.first} ? ' cursor-not-allowed' : ''" th:href="@{/admin/payments(page=${page.number-1}, size=${page.size}, status=${status})}">
                <span class="material-symbols-outlined">chevron_left</span>
            </a>
            <a class="size-10 flex items-center justify-center rounded border border-primary/30 text-primary font-bold" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" th:classappend="${i==page.number} ? ' bg-primary text-background-dark border-primary' : ''" th:href="@{/admin/payments(page=${i}, size=${page.size}, status=${status})}" th:text="${i+1}">1</a>
            <a class="size-10 flex items-center justify-center rounded border border-primary/30 text-primary/30" th:classappend="${page.last} ? ' cursor-not-allowed' : ''" th:href="@{/admin/payments(page=${page.number+1}, size=${page.size}, status=${status})}">
                <span class="material-symbols-outlined">chevron_right</span>
            </a>
        </div>
    </div>
</section>
</html>

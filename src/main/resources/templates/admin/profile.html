<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section}, 'Cài đặt tài khoản')}">
<section>
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
        <div class="glass-card rounded-2xl p-6">
            <h3 class="text-2xl font-display font-bold text-white mb-6">Thông tin quản trị</h3>

            <div th:if="${error}" class="mb-4 rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 text-red-300" th:text="${error}"></div>
            <div th:if="${success}" class="mb-4 rounded-lg border border-green-500/30 bg-green-500/10 px-4 py-3 text-green-300" th:text="${success}"></div>

            <form action="/admin/profile/update" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-300">Username</label>
                    <input type="text" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-500" th:value="${user.username}" disabled />
                </div>
                <div>
                    <label class="block text-sm text-slate-300">Vai trò</label>
                    <input type="text" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-500" th:value="${user.role}" disabled />
                </div>
                <div>
                    <label class="block text-sm text-slate-300">Email</label>
                    <input type="email" name="email" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" th:value="${user.email}" required />
                </div>
                <div>
                    <label class="block text-sm text-slate-300">Số điện thoại</label>
                    <input type="text" name="phone" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" th:value="${user.phone}" required />
                </div>
                <button type="submit" class="px-6 py-3 rounded-lg bg-primary text-background-dark font-bold hover:bg-champagne transition-all">
                    Lưu thông tin
                </button>
            </form>
        </div>

        <div class="glass-card rounded-2xl p-6">
            <h3 class="text-2xl font-display font-bold text-white mb-6">Đổi mật khẩu</h3>
            <form action="/admin/profile/password" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-300">Mật khẩu hiện tại</label>
                    <input type="password" name="currentPassword" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" required />
                </div>
                <div>
                    <label class="block text-sm text-slate-300">Mật khẩu mới</label>
                    <input type="password" name="newPassword" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" required />
                </div>
                <div>
                    <label class="block text-sm text-slate-300">Nhập lại mật khẩu mới</label>
                    <input type="password" name="confirmPassword" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" required />
                </div>
                <button type="submit" class="px-6 py-3 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all">
                    Cập nhật mật khẩu
                </button>
            </form>
        </div>
    </div>
</section>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section}, 'Báo cáo tổng hợp')}">
<section>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        <div class="p-6 rounded-xl border border-primary/10 glass-card">
            <p class="text-slate-500 text-sm">Tổng học viên</p>
            <h3 class="text-3xl font-bold text-slate-100" th:text="${tongHocVien}">0</h3>
        </div>
        <div class="p-6 rounded-xl border border-primary/10 glass-card">
            <p class="text-slate-500 text-sm">Tổng giáo viên</p>
            <h3 class="text-3xl font-bold text-slate-100" th:text="${tongGiaoVien}">0</h3>
        </div>
        <div class="p-6 rounded-xl border border-primary/10 glass-card">
            <p class="text-slate-500 text-sm">Doanh thu</p>
            <h3 class="text-3xl font-bold text-primary" th:text="|${#numbers.formatDecimal(tongThu, 0, 'POINT', 0, 'COMMA')} VND|">0</h3>
        </div>
        <div class="p-6 rounded-xl border border-primary/10 glass-card">
            <p class="text-slate-500 text-sm">Công nợ</p>
            <h3 class="text-3xl font-bold text-red-300" th:text="|${#numbers.formatDecimal(tongNo, 0, 'POINT', 0, 'COMMA')} VND|">0</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="p-6 rounded-xl border border-primary/10 glass-card">
            <h3 class="text-xl font-bold text-white mb-4">Đăng ký theo tháng</h3>
            <div class="flex items-end gap-3 h-48">
                <div class="bg-primary/40 w-full rounded-t" th:each="v : ${soLuongList}" th:style="'height:' + (v * 10 + 20) + 'px'"></div>
            </div>
            <div class="flex justify-between mt-2 text-xs text-slate-500">
                <span th:each="m : ${thangList}" th:text="'Th ' + ${m}"></span>
            </div>
        </div>
        <div class="p-6 rounded-xl border border-primary/10 glass-card">
            <h3 class="text-xl font-bold text-white mb-4">Trạng thái đăng ký</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between" th:each="t, i : ${trangThaiList}">
                    <span class="text-slate-300" th:text="${t}"></span>
                    <span class="text-primary font-bold" th:text="${soLuongTrangThai[i.index]}"></span>
                </div>
            </div>
        </div>
    </div>
</section>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section}, 'Khóa học')}">
<section>
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-10">
        <div>
            <h1 class="text-4xl font-display font-bold text-white mb-3">Danh sách khóa học</h1>
            <p class="text-slate-300">Tìm kiếm và khám phá lộ trình phù hợp với mục tiêu của bạn.</p>
        </div>
        <form class="flex items-center gap-3" method="get" action="/courses">
            <input class="rounded-lg bg-white/5 border border-white/10 text-slate-100" type="text" name="q" placeholder="Tìm tên khóa học" th:value="${q}"/>
            <button class="px-4 py-2 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all" type="submit">Tìm</button>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" th:if="${page != null}">
        <div class="p-6 rounded-xl bg-white/5 border border-white/10" th:each="c : ${page.content}">
            <h3 class="text-xl font-bold text-white mb-2" th:text="${c.name}">IELTS Premium</h3>
            <p class="text-slate-300 text-sm mb-4" th:text="${c.description}">Lộ trình cá nhân hóa cho học viên.</p>
            <div class="flex items-center justify-between text-sm text-slate-400 mb-4">
                <span th:text="${c.level}">Academic</span>
                <span th:text="${c.durationWeeks + ' tuần'}">12 tuần</span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-primary font-bold" th:text="|${#numbers.formatDecimal(c.fee, 0, 'POINT', 0, 'COMMA')} VND|">0</span>
                <a class="px-3 py-2 rounded-lg bg-primary text-background-dark font-bold" th:href="@{/course/{id}(id=${c.id})}">Xem chi tiết</a>
            </div>
        </div>
    </div>

    <div class="mt-10 flex items-center justify-center gap-3" th:if="${page != null and page.totalPages > 1}">
        <a class="px-3 py-2 rounded border border-primary/30 text-primary/40" th:classappend="${page.first} ? ' cursor-not-allowed' : ''" th:href="@{/courses(page=${page.number-1}, size=${page.size}, q=${q})}">Trước</a>
        <a class="px-3 py-2 rounded border border-primary/30 text-primary" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" th:classappend="${i==page.number} ? ' bg-primary text-background-dark border-primary' : ''" th:href="@{/courses(page=${i}, size=${page.size}, q=${q})}" th:text="${i+1}">1</a>
        <a class="px-3 py-2 rounded border border-primary/30 text-primary/40" th:classappend="${page.last} ? ' cursor-not-allowed' : ''" th:href="@{/courses(page=${page.number+1}, size=${page.size}, q=${q})}">Sau</a>
    </div>
</section>
</html>

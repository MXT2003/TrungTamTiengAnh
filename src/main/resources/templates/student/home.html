<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Student Home</title>
    <!-- CSS files from "Known" template -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/templatemo-style.css}">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .custom-navbar {
            background: #ffffff;
            border-top: 5px solid #29ca8e;
            box-shadow: 0 1px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 0;
            padding: 12px 0;
        }

        .navbar-brand {
            color: #454545 !important;
            font-size: 24px !important;
            font-weight: bold;
        }

        .nav li a {
            color: #575757 !important;
            font-weight: bold;
            font-size: 15px;
        }

        .main-content {
            padding-top: 120px;
            padding-bottom: 50px;
        }

        .panel-custom {
            border-radius: 8px;
            border-top: 5px solid #3f51b5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            background: #fff;
            padding: 30px;
            text-align: center;
        }

        .btn-custom {
            background-color: #3f51b5;
            color: #fff;
            border-radius: 50px;
            padding: 10px 20px;
            border: none;
            transition: all 0.3s;
            margin: 10px;
            display: inline-block;
        }

        .btn-custom:hover {
            background-color: #2e3a80;
            color: #fff;
        }

        .btn-success-custom {
            background-color: #29ca8e;
        }

        .btn-success-custom:hover {
            background-color: #23ba81;
        }
    </style>
</head>

<body id="top" data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <!-- MENU -->
    <section class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/student/home" class="navbar-brand">Student Portal</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/logout" style="color: #e74a3b !important;">Logout</a></li>
                </ul>
            </div>
        </div>
    </section>

    <div class="container main-content">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="panel-custom">
                    <h2 style="margin-bottom: 30px;">Trang chủ Học viên</h2>

                    <a href="/student/classes" class="btn btn-custom">
                        <i class="fa fa-book"></i> Xem lớp học
                    </a>
                    <a href="/student/my-classes" class="btn btn-custom btn-success-custom">
                        <i class="fa fa-check-circle"></i> Lớp đã đăng ký
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- JS files -->
    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>

</body>

</html>

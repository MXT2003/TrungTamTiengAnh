<!DOCTYPE html>
<html class="dark" lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, pageTitle)">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle}">Royal Academy Student</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0b329",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0a0c14",
                        "surface-dark": "#2a261a"
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"}
                }
            }
        }

    <style>
        body {
            font-family: 'Noto Sans', sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            background-attachment: fixed;
        }
        h1, h2, h3, .font-display { font-family: 'Noto Serif', serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(224, 179, 41, 0.2);
        }        .gold-gradient {
            background: linear-gradient(135deg, #e0b329 0%, #b38b1d 100%);
        }
        .soft-glow {
            box-shadow: 0 0 20px rgba(224, 179, 41, 0.15);
        }
        .universe-bg {
            background-image:
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: orbit 60s linear infinite;
        }
        @keyframes orbit {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 380px 820px; }
        }
        select {
            background-color: rgba(15, 23, 42, 0.85);
            color: #e2e8f0;
        }
        select option {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-weight: 400;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
    </style>
</head>

            <div class="flex items-center gap-3">

                    <svg class="text-primary" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 7l9-4 9 4-9 4-9-4z"></path>
                        <path d="M7 10v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-5"></path>
                        <path d="M3 7v6"></path>
                        <path d="M3 13l2 1"></path>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-primary text-xl font-bold leading-tight font-display tracking-tight">Royal Academy</h1>
                    <p class="text-primary/60 text-[10px] uppercase tracking-widest font-bold">Cổng học viên</p>
                </div>
            </div>
            <nav class="flex flex-col gap-2">
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-all group" href="/student/home">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                        <rect x="13" y="3" width="8" height="5"></rect>
                        <rect x="13" y="10" width="8" height="11"></rect>
                        <rect x="3" y="13" width="8" height="8"></rect>
                    </svg>

                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-all group" href="/student/classes">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 4h10a2 2 0 0 1 2 2v13H6a2 2 0 0 0-2 2V4z"></path>

                    </svg>
                    <span class="text-sm font-medium">Đăng ký lớp</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-all group" href="/student/my-classes">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 21V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v17"></path>
                        <path d="M16 12h4v9"></path>

                    <span class="text-sm font-medium">Lớp của tôi</span>

                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 7h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z"></path>
                        <path d="M18 7V5a2 2 0 0 0-2-2H4"></path>

                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                </svg>

            </a>
            <a class="flex items-center gap-3 p-3 rounded-xl bg-slate-800/40 border border-slate-700/50" href="/logout">
                <svg class="h-5 w-5 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M10 17l5-5-5-5"></path>
                    <path d="M15 12H4"></path>
                    <path d="M20 4v16"></path>
                </svg>
                <div class="flex flex-col">
                    <p class="text-xs font-bold text-slate-200">Đăng xuất</p>
                    <p class="text-[10px] text-primary">Thoát tài khoản</p>
                </div>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="flex items-center justify-between px-10 py-6 border-b border-primary/10 bg-black/30 backdrop-blur-xl sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-bold tracking-tight text-slate-200 font-display" th:text="${pageTitle}">Trang học viên</h2>
            </div>
            <div class="flex items-center gap-2">
            <a class="p-2 rounded-full bg-slate-900 border border-slate-800 text-slate-400 hover:text-primary hover:border-primary/40 transition-all" href="/logout" title="Đăng xuất">

                    <path d="M20 4v16"></path>

            </div>
        </header>

        <div class="p-10">
            <div th:replace="${content}"></div>
        </div>

        <footer class="px-10 py-6 text-slate-600 text-[10px] uppercase tracking-widest font-bold border-t border-primary/5 text-center">
            © 2024 Royal Academy Management System • Bản quyền thuộc về Royal Academy
        </footer>
    </main>
</div>

<canvas class="fixed inset-0 z-[60] pointer-events-none" id="sparkle-canvas"></canvas>
<script>
    const canvas = document.getElementById('sparkle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 2 - 1;
            this.speedY = Math.random() * 2 - 1;
            this.life = 1;
            this.decay = Math.random() * 0.02 + 0.01;
            this.color = Math.random() > 0.5 ? '#e0b329' : '#ffffff';
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }

        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - this.size * 2);
            ctx.lineTo(this.x + this.size, this.y);
            ctx.lineTo(this.x, this.y + this.size * 2);
            ctx.lineTo(this.x - this.size, this.y);
            ctx.closePath();
            ctx.fill();
        }
    }

    window.addEventListener('mousemove', (e) => {
        for (let i = 0; i < 2; i++) {
            particles.push(new Particle(e.clientX, e.clientY));
        }
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>

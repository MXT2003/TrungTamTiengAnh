<!DOCTYPE html>
<html class="dark" lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle}">Student</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0b329",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0a0c14"
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        h1, h2, h3, .font-display { font-family: 'Noto Serif', serif; }
        .universe-bg {
            background-image:
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: orbit 60s linear infinite;
        }
        select {
            background-color: rgba(15, 23, 42, 0.85);
            color: #e2e8f0;
        }
        select option {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        @keyframes orbit {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 380px 820px; }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen universe-bg">
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-900/30 blur-[150px] rounded-full"></div>
        <div class="absolute top-1/4 right-1/4 w-[30%] h-[30%] bg-primary/10 blur-[100px] rounded-full"></div>
    </div>

    <header class="relative z-10 sticky top-0 bg-black/40 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3 text-primary">
                <span class="material-symbols-outlined text-3xl">school</span>
                <h1 class="text-lg font-display font-bold uppercase tracking-wide">Student Portal</h1>
            </div>
            <nav class="flex items-center gap-4 text-sm">
                <a class="text-slate-300 hover:text-primary transition-colors" href="/student/home">Trang chủ</a>
                <a class="text-slate-300 hover:text-primary transition-colors" href="/student/classes">Đăng ký lớp</a>
                <a class="text-slate-300 hover:text-primary transition-colors" href="/student/my-classes">Lớp của tôi</a>
                <a class="text-slate-300 hover:text-primary transition-colors" href="/student/payments">Học phí</a>
                <a class="text-red-300 hover:text-red-200 transition-colors" href="/logout">Đăng xuất</a>
            </nav>
        </div>
    </header>

    <main class="relative z-10 max-w-6xl mx-auto px-6 py-10">
        <div class="mb-8">
            <h2 class="text-2xl font-bold font-display" th:text="${pageTitle}">Trang học viên</h2>
            <p class="text-slate-400 text-sm">Theo dõi tiến độ học tập và đăng ký lớp</p>
        </div>
        <div th:replace="${content}"></div>
    </main>

    <canvas class="fixed inset-0 z-[60] pointer-events-none" id="sparkle-canvas"></canvas>
    <script>
        const canvas = document.getElementById('sparkle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = Math.random() > 0.5 ? '#e0b329' : '#ffffff';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size * 2);
                ctx.lineTo(this.x + this.size, this.y);
                ctx.lineTo(this.x, this.y + this.size * 2);
                ctx.lineTo(this.x - this.size, this.y);
                ctx.closePath();
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>

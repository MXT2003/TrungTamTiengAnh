<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lop da dang ky</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/templatemo-style.css}">

    <style>
        body { background-color: #f4f6f9; }
        .custom-navbar {
            background: #ffffff;
            border-top: 5px solid #29ca8e;
            box-shadow: 0 1px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 0;
            padding: 12px 0;
        }
        .navbar-brand {
            color: #454545 !important;
            font-size: 24px !important;
            font-weight: bold;
        }
        .main-content { padding-top: 120px; padding-bottom: 50px; }
        .panel-custom {
            border-radius: 8px;
            border-top: 5px solid #29ca8e;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            background: #fff;
            padding: 30px;
        }
        .table>thead>tr>th { border-bottom: 2px solid #29ca8e; color: #353535; }
        .status-badge {
            background-color: #f6c23e;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .action-links { margin-top: 20px; }
        .action-links a { color: #757575; font-weight: bold; }
        .action-links a:hover { color: #353535; }
    </style>
</head>

<body id="top" data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <section class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a href="/student/home" class="navbar-brand">Student Portal</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/logout" style="color: #e74a3b !important;">Logout</a></li>
                </ul>
            </div>
        </div>
    </section>

    <div class="container main-content">
        <div class="panel-custom">
            <h2 style="margin-bottom: 25px;">Lop da dang ky</h2>

            <div class="table-responsive">
                <table class="table table-hover table-striped">
                    <thead>
                        <tr>
                            <th>Ten lop</th>
                            <th>Giao vien</th>
                            <th>Lich hoc</th>
                            <th>Trang thai</th>
                            <th>Hanh dong</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dk : ${list}">
                            <td th:text="${dk.lopHoc.tenLop}" style="font-weight: bold; color: #353535;"></td>
                            <td th:text="${dk.lopHoc.teacher != null ? dk.lopHoc.teacher.fullName : dk.lopHoc.giaoVien}"></td>
                            <td th:text="${dk.lopHoc.lichHoc}"></td>
                            <td><span class="status-badge" th:text="${dk.trangThai}"></span></td>
                            <td>
                                <form th:if="${dk.trangThai == 'CHO_DUYET'}" th:action="@{/student/cancel/{id}(id=${dk.id})}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm">Huy</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="action-links">
                <a href="/student/classes"><i class="fa fa-arrow-left"></i> Quay lai danh sach lop</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>

</body>

</html>

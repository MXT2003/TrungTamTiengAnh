<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{student/layout :: layout(~{::section}, 'Lớp đã đăng ký')}">
<section>
    <div class="overflow-hidden rounded-2xl border border-white/10 bg-white/5">
        <table class="min-w-full divide-y divide-white/10">
            <thead class="bg-white/5 text-slate-300">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Tên lớp</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Giáo viên</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Lịch học</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Trạng thái</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
                <tr class="hover:bg-white/5" th:each="dk : ${list}">
                    <td class="px-4 py-3 font-semibold text-slate-100" th:text="${dk.lopHoc.tenLop}"></td>
                    <td class="px-4 py-3" th:text="${dk.lopHoc.teacher != null ? dk.lopHoc.teacher.fullName : dk.lopHoc.giaoVien}"></td>
                    <td class="px-4 py-3" th:text="${dk.lopHoc.lichHoc}"></td>
                    <td class="px-4 py-3"><span class="px-2 py-1 text-xs rounded-full bg-amber-500/20 text-amber-300" th:text="${dk.trangThai}"></span></td>
                    <td class="px-4 py-3">
                        <form th:if="${dk.trangThai == 'CHO_DUYET'}" th:action="@{/student/cancel/{id}(id=${dk.id})}" method="post">
                            <button type="submit" class="px-3 py-2 rounded-lg border border-red-500/40 text-red-400 hover:bg-red-500 hover:text-white transition-all">Hủy</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-6">
        <a href="/student/classes" class="text-primary hover:underline">Quay lại danh sách lớp</a>
    </div>
</section>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{student/layout :: layout(~{::section}, 'Đăng ký lớp')}">
<section>
    <div th:if="${error}" class="mb-4 text-red-400" th:text="${error}"></div>

    <div class="overflow-hidden rounded-2xl border border-white/10 bg-white/5">
        <table class="min-w-full divide-y divide-white/10">
            <thead class="bg-white/5 text-slate-300">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Tên lớp</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Giáo viên</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Lịch học</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Sĩ số</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Còn chỗ</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Trạng thái</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
                <tr class="hover:bg-white/5" th:each="lh : ${list}">
                    <td class="px-4 py-3 font-semibold text-slate-100" th:text="${lh.tenLop}"></td>
                    <td class="px-4 py-3" th:text="${lh.teacher != null ? lh.teacher.fullName : lh.giaoVien}"></td>
                    <td class="px-4 py-3" th:text="${lh.lichHoc}"></td>
                    <td class="px-4 py-3" th:text="${lh.siSo}"></td>
                    <td class="px-4 py-3" th:text="${conChoMap[lh.id]}"></td>
                    <td class="px-4 py-3" th:text="${lh.moDangKy ? 'Mở' : 'Đóng'}"></td>
                    <td class="px-4 py-3">
                        <a th:if="${lh.moDangKy and conChoMap[lh.id] > 0}" th:href="@{/student/register/{id}(id=${lh.id})}" class="px-3 py-2 rounded-lg bg-primary text-background-dark font-bold">Đăng ký</a>
                        <span th:if="${!lh.moDangKy or conChoMap[lh.id] <= 0}" class="text-red-400 font-semibold">Không thể đăng ký</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-6 flex flex-wrap gap-4">
        <a href="/student/my-classes" class="text-primary hover:underline">Xem lớp đã đăng ký</a>
        <a href="/student/home" class="text-slate-400 hover:text-primary">Quay lại trang chủ</a>
    </div>
</section>
</html>

<!DOCTYPE html>
<html class="dark" lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0b329",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0a0c14"
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        h1, h2, h3, .font-display { font-family: 'Noto Serif', serif; }
        .universe-bg {
            background-image:
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: orbit 60s linear infinite;
        }
        @keyframes orbit {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 380px 820px; }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center px-4 universe-bg">
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-900/30 blur-[150px] rounded-full"></div>
        <div class="absolute top-1/4 right-1/4 w-[30%] h-[30%] bg-primary/10 blur-[100px] rounded-full"></div>
    </div>

    <div class="relative z-10 w-full max-w-md bg-white/5 border border-white/10 rounded-2xl p-8">
        <h2 class="text-2xl font-bold font-display text-center mb-6">Đăng ký tài khoản</h2>
        <div th:if="${error}" class="text-red-400 text-center mb-4">
            <span th:text="${error}"></span>
        </div>
        <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-300">Username</label>
                <input type="text" th:field="*{username}" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" required />
                <div th:if="${#fields.hasErrors('username')}" class="text-red-400 text-xs mt-2">
                    <span th:errors="*{username}"></span>
                </div>
            </div>
            <div>
                <label class="block text-sm text-slate-300">Password</label>
                <input type="password" th:field="*{password}" class="mt-2 w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" required />
                <div th:if="${#fields.hasErrors('password')}" class="text-red-400 text-xs mt-2">
                    <span th:errors="*{password}"></span>
                </div>
            </div>
            <button type="submit" class="w-full px-6 py-3 rounded-lg bg-primary text-background-dark font-bold hover:bg-white transition-all">Đăng ký</button>
        </form>
        <div class="text-center text-sm text-slate-400 mt-4">
            Đã có tài khoản? <a class="text-primary hover:underline" href="/login">Đăng nhập ngay</a>
        </div>
    </div>

    <canvas class="fixed inset-0 z-[60] pointer-events-none" id="sparkle-canvas"></canvas>
    <script>
        const canvas = document.getElementById('sparkle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = Math.random() > 0.5 ? '#e0b329' : '#ffffff';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size * 2);
                ctx.lineTo(this.x + this.size, this.y);
                ctx.lineTo(this.x, this.y + this.size * 2);
                ctx.lineTo(this.x - this.size, this.y);
                ctx.closePath();
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>

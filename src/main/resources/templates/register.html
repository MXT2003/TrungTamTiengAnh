<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Đăng ký</title>
    <!-- CSS files from "Known" template -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/templatemo-style.css}">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .main-content {
            padding-top: 100px;
            padding-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-panel {
            background: #ffffff;
            border-radius: 8px;
            border-top: 5px solid #3f51b5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .login-panel h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #353535;
            text-align: center;
        }

        .form-control {
            border-radius: 4px;
            box-shadow: none;
            height: 45px;
        }

        .form-control:focus {
            border-color: #3f51b5;
            box-shadow: none;
        }

        .btn-custom {
            background-color: #3f51b5;
            color: #fff;
            border-radius: 50px;
            padding: 10px 20px;
            border: none;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-custom:hover {
            background-color: #2e3a80;
            color: #fff;
        }

        .register-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #757575;
        }

        .register-link a {
            color: #29ca8e;
            font-weight: bold;
        }

        .register-link a:hover {
            color: #23ba81;
        }
    </style>
</head>

<body id="top" data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <div class="container main-content">
        <div class="login-panel">
            <h2>Đăng ký tài khoản</h2>
            <div th:if="${error}" style="color:#e74a3b; text-align:center; margin-bottom:15px;">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" class="form-control" required />
                    <div th:if="${#fields.hasErrors('username')}" style="color:#e74a3b; font-size:12px; margin-top:6px;">
                        <span th:errors="*{username}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required />
                    <div th:if="${#fields.hasErrors('password')}" style="color:#e74a3b; font-size:12px; margin-top:6px;">
                        <span th:errors="*{password}"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom">Đăng ký</button>
                <div class="register-link">
                    Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>

    <!-- JS files -->
    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{teacher/layout :: layout(~{::section}, 'Bảng điều khiển giáo viên')}">
<section>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
            <p class="text-slate-400">Số lớp đang dạy</p>
            <h3 class="text-3xl font-bold text-primary" th:text="${classCount}">0</h3>
        </div>
        <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
            <p class="text-slate-400">Số học viên (đã duyệt)</p>
            <h3 class="text-3xl font-bold text-primary" th:text="${studentCount}">0</h3>
        </div>
    </div>

    <div class="mt-8 flex flex-wrap gap-4">
        <a class="px-6 py-3 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all" href="/teacher/classes">Danh sách lớp</a>
        <a class="px-6 py-3 rounded-lg border border-primary/30 text-primary hover:border-primary transition-all" href="/logout">Logout</a>
    </div>
</section>
</html>

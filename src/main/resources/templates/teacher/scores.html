<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{teacher/layout :: layout(~{::section}, 'Nhập điểm')}">
<section>
    <h3 class="text-xl font-bold mb-4" th:text="'Nhập điểm lớp: ' + ${lopHoc.tenLop}"></h3>

    <form method="post" th:action="@{/teacher/class/{id}/scores(id=${lopHoc.id})}" class="space-y-4">
        <div class="overflow-hidden rounded-2xl border border-white/10 bg-white/5">
            <table class="min-w-full divide-y divide-white/10">
                <thead class="bg-white/5 text-slate-300">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Học viên</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Điểm</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Ghi chú</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <tr class="hover:bg-white/5" th:each="dk : ${list}">
                        <td class="px-4 py-3" th:text="${dk.student.username}"></td>
                        <td class="px-4 py-3">
                            <input type="hidden" name="studentId" th:value="${dk.student.id}">
                            <input type="text" name="score" class="w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" placeholder="0-10">
                        </td>
                        <td class="px-4 py-3">
                            <input type="text" name="comment" class="w-full rounded-lg bg-white/5 border border-white/10 text-slate-100" placeholder="Nhận xét">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="flex items-center gap-4">
            <button type="submit" class="px-6 py-3 rounded-lg bg-primary text-background-dark font-bold hover:bg-champagne transition-all">Lưu điểm</button>
            <a th:href="@{/teacher/classes}" class="text-primary hover:underline">Quay lại</a>
        </div>
    </form>
</section>
</html>

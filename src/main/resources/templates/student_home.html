<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Trang Học Viên</title>
    <!-- CSS files from "Known" template -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/templatemo-style.css}">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .custom-navbar {
            background: #ffffff;
            border-top: 5px solid #29ca8e;
            box-shadow: 0 1px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 0;
            padding: 12px 0;
        }

        .navbar-brand {
            color: #454545 !important;
            font-size: 24px !important;
            font-weight: bold;
        }

        .main-content {
            padding-top: 120px;
            padding-bottom: 50px;
        }

        .panel-custom {
            border-radius: 8px;
            border-top: 5px solid #29ca8e;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            background: #fff;
            padding: 40px;
            text-align: center;
        }

        .welcome-text {
            color: #454545;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .action-box {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 30px 20px;
            margin-top: 20px;
            transition: all 0.3s;
            display: block;
            text-decoration: none !important;
            color: #454545;
        }

        .action-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border-color: #29ca8e;
        }

        .action-icon {
            font-size: 40px;
            color: #29ca8e;
            margin-bottom: 15px;
        }

        .action-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body id="top" data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <!-- MENU -->
    <section class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a href="/student/home" class="navbar-brand">
                    <i class="fa fa-graduation-cap" style="color: #29ca8e; margin-right: 10px;"></i> Student Portal
                </a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/logout" style="color: #e74a3b !important; font-weight: bold;"><i
                                class="fa fa-sign-out"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </section>

    <div class="container main-content">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="panel-custom">
                    <h2 class="welcome-text">Chào mừng Học Viên!</h2>
                    <p style="color: #777; font-size: 16px; margin-bottom: 30px;">Hệ thống quản lý học tập dành riêng
                        cho bạn.</p>

                    <div class="row">
                        <div class="col-md-6">
                            <a href="/student/classes" class="action-box">
                                <i class="fa fa-list-ul action-icon"></i>
                                <div class="action-title">Danh sách lớp học</div>
                                <p style="color: #888; margin: 0;">Xem các lớp học đang mở và đăng ký tham gia</p>
                            </a>
                        </div>
                        <div class="col-md-6">
                            <a href="/student/my-classes" class="action-box">
                                <i class="fa fa-book action-icon"></i>
                                <div class="action-title">Lớp của tôi</div>
                                <p style="color: #888; margin: 0;">Xem các lớp đã đăng ký và kết quả học tập</p>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS files -->
    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>

</body>

</html>
